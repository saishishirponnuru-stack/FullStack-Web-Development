<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning the Basics</title>

    <style>
        body {
            background-color: #cfdce7;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 70%;
            margin: auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #4CAF50;
            box-shadow: 0 0 10px gray;
        }

         h1 {
            color: hsl(236, 99%, 48%);
            text-align: center;
            border: 4px solid rgb(253, 107, 3);
            border-radius: 10px;
            text-align: center;
        }

        h2 {
            color: darkgreen;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        ul,
        ol {
            font-size: 18px;
        }

        li {
            margin: 8px 0;
        }

        button {
            background-color: royalblue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: navy;
        }

        hr {
            margin-top: 25px;
            border: 1px solid gray;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Welcome to my HTML document</h1>

        <p>Hello! My name is <strong>Sai Shishir</strong>.</p>

        <h2>About Me</h2>

        <p>I am a CSE (AI & ML) student learning HTML and CSS.</p>

        <h2>My Hobbies</h2>

        <ul>
            <li>Coding</li>
            <li>Cricket</li>
            <li>Watching Movies</li>
        </ul>

        <h2>Skills</h2>

        <ol>
            <li>Python</li>
            <li>HTML</li>
            <li>CSS</li>
        </ol>

        <br><br>

        <button>Click Me</button>

        <hr>

    </div>

</body>

</html>
